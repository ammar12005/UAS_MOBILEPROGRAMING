name: aplikasi_manajemen_event_dan_tiket_digital
description: "Aplikasi manajemen event dan tiket digital dengan Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date & Time Formatting
  intl: ^0.19.0
  
  # QR Code Generation & Scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  
  # PDF Generation & Printing
  pdf: ^3.11.1
  printing: ^5.13.3
  
  # Permissions Handler
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true